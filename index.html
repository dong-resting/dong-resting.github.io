<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Me的小窝</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 加载界面 -->
  <div class="loader" id="loader">
    <div class="loader-box">
      <div class="loader-spin"></div>
      <p>加载中…</p>
    </div>
  </div>

  <video class="video-bg" id="bgVideo" autoplay muted loop playsinline preload="auto">
    <source src="https://img.naixiai.cn/2026/07/06/Backgrounda524ffe9bb824380.mp4" type="video/mp4" />
  </video>
  <div class="video-overlay"></div>

  <!-- Stage：个人介绍 + 主窗口 + 翻页按钮 -->
  <div class="stage">
    <!-- 个人介绍 -->
    <aside class="intro" id="intro">
      <div class="intro-avatar-wrap">
        <svg class="intro-avatar-svg" viewBox="0 0 48.87 48.78">
          <defs>
            <mask id="am">
              <polyline
                points="6.01 15.13 24.92 5.5 5.5 29.59 42.73 10.02 7.42 41.24 43.37 23.89 22.39 43.28 42.99 37.97" />
            </mask>
          </defs>
          <image href="img/头像.jpg" x="0" y="0" width="48.87" height="48.78" mask="url(#am)" />
        </svg>
      </div>
      <p class="intro-owner">袁建东:</p>
      <h2 class="intro-name">Me的小窝</h2>
      <p class="intro-bio">me,计算机-网络工程专业学生，欢迎讨论。</p>
      <div class="intro-tags">
        <span>前端开发</span>
        <span>python</span>
        <span>HCIA-datacom</span>
        <span>linux</span>
      </div>
      <button class="intro-about" id="introAbout">
        <span class="repo-title">个人介绍</span>
        <span class="repo-sub">了解我是谁</span>
      </button>
      <a class="intro-repo" href="https://github.com/dong-resting" target="_blank">
        <span class="repo-title">我的仓库</span>
        <span class="repo-sub">分享各种有趣的小工具和GitHub项目</span>
      </a>
    </aside>

    <main class="main" id="main">
      <div class="header">
        <h1>欢迎来到我的博客</h1>
        <p>记录想法、代码与生活</p>
      </div>

      <div class="posts" id="posts"></div>
      <div class="page-info" id="pageInfo"></div>
    </main>

    <nav class="page-nav">
      <button class="page-btn" id="prevPage" aria-label="上一篇">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 15l-6-6-6 6"/>
        </svg>
      </button>
      <button class="page-btn" id="nextPage" aria-label="下一篇">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </button>
    </nav>
  </div>

  <!-- 页面底部 footer（移出主窗口） -->
  <footer class="footer">
    <span>Ciallo～(∠・ω< )⌒☆</span>
    <div class="links">
      <a href="https://github.com/dong-resting">GitHub</a>
      <a href="#" title="yuanjd666@163.com / QQ:3216249724">联系我</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="posts.js"></script>
  <script src="script.js"></script>
</body>
</html>
